name: Track PR Failures
on:
  workflow_run:
    workflows: ["*"] # Triggered when any other workflow finishes
    types:
      - completed

permissions:
  issues: write
  pull-requests: read

jobs:
  manage-tracking-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Check Workflow Status
        id: check_status
        run: |
          # We only care about workflows triggered by pull requests
          if [ "${{ github.event.workflow_run.event }}" != "pull_request" ]; then
            echo "Not a PR workflow. Skipping."
            echo "run=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          PR_NUMBER=$(jq '.pull_requests[0].number' << 'EOF'
          ${{ toJson(github.event.workflow_run) }}
          EOF
          )

          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "conclusion=${{ github.event.workflow_run.conclusion }}" >> $GITHUB_OUTPUT
          echo "run=true" >> $GITHUB_OUTPUT

      - name: Handle Failed Status (Create/Reopen Issue)
        if: steps.check_status.outputs.run == 'true' && steps.check_status.outputs.conclusion == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const prNum = "${{ steps.check_status.outputs.pr_number }}";
            const title = `🚨 PR #${prNum} has failing checks (Red X)`;

            // Search for an existing issue tracking this specific PR
            const { data: issues } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} type:issue "${title}" state:any`
            });

            const body = `Automated Tracker: The recent check for Pull Request #${prNum} failed. Please review the logs and fix the errors before merging.`;

            if (issues.total_count > 0) {
              const existingIssue = issues.items[0];
              if (existingIssue.state === 'closed') {
                // Reopen the issue if it was previously fixed but failed again
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existingIssue.number,
                  state: 'open'
                });
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existingIssue.number,
                  body: "🔄 Checks failed again on a new commit. Reopening."
                });
              }
            } else {
              // Create a brand new tracking issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['ci-failure', 'automated-track']
              });
            }

      - name: Handle Passed Status (Resolve/Close Issue)
        if: steps.check_status.outputs.run == 'true' && steps.check_status.outputs.conclusion == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const prNum = "${{ steps.check_status.outputs.pr_number }}";
            const title = `🚨 PR #${prNum} has failing checks (Red X)`;

            // Find open tracking issues for this PR
            const { data: issues } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} type:issue "${title}" state:open`
            });

            if (issues.total_count > 0) {
              for (const issue of issues.items) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: "✅ All checks have successfully passed! Closing tracking issue."
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed'
                });
              }
            }
